<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>SHVEDAVTO</title>
  </head>
  <body>

    <!-- HERO -->
    <div class="w-full h-screen bg-[url(photos/hero_bg.png)] bg-cover bg-center flex flex-col">

      <header class="bg-[#1E3A8A]/74 h-20">
        <div class="max-w-7xl mx-auto px-6 h-20 flex flex-row items-center justify-around">
          <div>
            <img src="photos/SHVEDAVTO_logo.svg" class="w-50 h-10">
          </div>

          <nav class="font-body font-semibold text-[#ffffff] w-163 flex justify-around">
            <span>О нас</span>
            <span>Калькулятор</span>
            <span>Отзывы</span>
            <span>Контакты</span>
          </nav>

          <div class="w-39 h-10 flex justify-between">
            <img src="photos/vk_logo.svg">
            <img src="photos/tg_logo.svg">
          </div>
        </div>
      </header>

      <div id="hero" class="flex-1 max-w-7xl w-full mx-auto px-6 flex flex-col justify-center items-start">
        <p class="font-display text-white text-5xl my-8">Заводская мощность<br>— не предел</p>

        <p class="font-body text-white text-2xl font-semibold my-8">Профессиональный чип-тюнинг бензиновых, дизельных и<br>турбированных двигателей в Самаре</p>

        <div class="h-48 flex flex-col my-8 justify-between">
          <button class="bg-[#FACC15] rounded-2xl w-96 h-21 font-body font-semibold text-[#0F172A] text-3xl">Рассчитать стоимость</button>
          <button class="border rounded-2xl border-[#ffffff] w-96 h-21 font-body font-semibold text-[#ffffff] text-3xl">Узнать подробнее</button>
        </div>
      </div>

    </div>
    <!-- /HERO -->

    <!-- ПОЧЕМУ SHVEDAVTO -->
    <div id="about" class="h-140 flex flex-col items-center">
      <p class="font-display text-[64px] text-[#1D4ED8] m-8">Почему SHVEDAVTO</p>
    </div>
    

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
